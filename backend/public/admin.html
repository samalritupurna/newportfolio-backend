<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Ritupurna Samal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 4rem auto;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 4rem;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--card-border);
        }
        
        #login-view {
            max-width: 450px;
            margin: 0 auto;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .messages-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 3rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--card-border);
        }
        
        .messages-table th, .messages-table td {
            text-align: left;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--card-border);
        }
        
        .messages-table th {
            color: var(--accent-start);
            font-weight: 600;
            background: rgba(0, 0, 0, 0.4);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        .messages-table tr:last-child td {
            border-bottom: none;
        }

        .messages-table tr {
            transition: var(--transition);
        }

        .messages-table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }
        
        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #FCA5A5;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            float: right;
            transition: var(--transition);
            font-weight: 600;
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.2);
        }

        .dashboard-header {
            margin-bottom: 2rem;
        }
        .dashboard-header h2 {
            font-size: 2.5rem;
            color: var(--primary-text);
            margin-bottom: 0.5rem;
        }
        .dashboard-header p {
            color: var(--secondary-text);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-container">
            <h1 class="logo">Ritupurna Samal <span style="color:var(--text-light); font-size:1.2rem;">| Admin</span></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Back to Portfolio</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container admin-container">
            
            <!-- LOGIN VIEW -->
            <div id="login-view">
                <h2 class="section-title">Admin Login</h2>
                <form id="login-form" class="login-form">
                    <div id="login-error" style="display: none; color: red; text-align: center;">Invalid credentials</div>
                    <div class="form-group">
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
            </div>

            <!-- DASHBOARD VIEW -->
            <div id="dashboard-view" style="display: none;">
                <button class="logout-btn" id="logout-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px; vertical-align:middle;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
                <div class="dashboard-header">
                    <h2>Inbox Messages</h2>
                    <p>Securely view messages submitted through your contact form.</p>
                </div>
                
                <table class="messages-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Subject</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="messages-body">
                        <!-- Messages populated here -->
                    </tbody>
                </table>
            </div>
            
        </div>
    </main>

    <script>
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const loginForm = document.getElementById('login-form');
        const logoutBtn = document.getElementById('logout-btn');
        const messagesBody = document.getElementById('messages-body');
        
        // Check if already logged in
        const token = localStorage.getItem('adminToken');
        if (token) {
            showDashboard(token);
        }

        // Handle Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('https://newportfolio-backend-26pw.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    showDashboard(data.token);
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            }
        });

        // Handle Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            dashboardView.style.display = 'none';
            loginView.style.display = 'block';
            loginForm.reset();
        });

        // Fetch and display messages
        async function showDashboard(token) {
            try {
                const res = await fetch('https://newportfolio-backend-26pw.onrender.com/api/messages', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await res.json();
                
                if (data.success) {
                    loginView.style.display = 'none';
                    dashboardView.style.display = 'block';
                    
                    messagesBody.innerHTML = '';
                    data.messages.forEach(msg => {
                        const date = new Date(msg.created_at).toLocaleDateString();
                        messagesBody.innerHTML += `
                            <tr>
                                <td>${date}</td>
                                <td><strong>${msg.name}</strong></td>
                                <td><a href="mailto:${msg.email}">${msg.email}</a></td>
                                <td>${msg.subject || '-'}</td>
                                <td>${msg.message}</td>
                            </tr>
                        `;
                    });
                } else {
                    // Token likely invalid/expired
                    localStorage.removeItem('adminToken');
                    loginView.style.display = 'block';
                    dashboardView.style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                alert('Failed to fetch messages');
            }
        }
    </script>
</body>
</html>
